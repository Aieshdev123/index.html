<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR-CODE Generater</title>
    <link rel="stylesheet" href="QR.css">
</head>
<body>
    <div class="qr_box">
        <header>
            <h1>QR CODE GENERATER </h1>
            <P>Paste URL or ENTER TEXT to create QR_code</P>
        </header>
         <div class="form">
            <input type="text" placeholder="Enter URL or TEXT">
            <button>Generate QR code</button>
            <button id="downloadBtn">Download QR Code</button>

         </div>
         <div class="qr-code">
           <img src=""alt="qr-code">
         </div>
    </div>




<script  src="QR script.js"></script> 
</body>
</html>
